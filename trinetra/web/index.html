<!DOCTYPE html>
<html>
<head>
  <!--
    TriNetra Web App — PWA enabled
    If you are serving your web app in a path other than the root, change the href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for it to work correctly.
    For more details: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TriNetra - A Premium Social Super-App. Connect. Share. Grow.">
  <meta name="keywords" content="TriNetra, social media, connect, share, India">
  <meta name="author" content="TriNetra Technologies">

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TriNetra">
  <meta name="theme-color" content="#1877F2">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5">

  <!-- Open Graph / Social Preview -->
  <meta property="og:title" content="TriNetra - Connect. Share. Grow.">
  <meta property="og:description" content="A Premium Social Super-App for everyone.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://trinetra.web.app">
  <meta property="og:image" content="https://trinetra.web.app/icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TriNetra">
  <meta name="twitter:description" content="Connect. Share. Grow.">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>TriNetra</title>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('flutter_service_worker.js?v=1')
          .then(function(reg) {
            console.log('[SW] TriNetra service worker registered.');
          })
          .catch(function(err) {
            console.warn('[SW] Service worker registration failed:', err);
          });
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // Expose install function to Flutter
    window.triggerInstallPrompt = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('PWA install prompt outcome:', outcome);
        deferredPrompt = null;
      }
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
