# ==============================================================
# 👁️🔥 TRINETRA CODE GUARD (Point 12)
# 100% REAL: Facebook 2026 Standard | Zero Lazy Coding Policy
# ==============================================================

# यह फाइल 'TriNetra' के पूरे कोड की क्वालिटी को कंट्रोल करती है।
include: package:flutter_lints/flutter.yaml

analyzer:
  # 'Asli' Strict Mode: यहाँ हम Dart को मजबूर करते हैं कि वो हर टाइप को चेक करे।
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  # इन फाइलों को लिटर चेक नहीं करेगा (Generated Files)
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated_plugin_registrant.dart"
    - "lib/firebase_options.dart"

  # गलतियों को सीधा Error बनाना ताकि बिल्ड फेल हो जाए (Production Ready)
  errors:
    missing_required_param: error
    missing_return: error
    todo: ignore
    unused_local_variable: error
    unused_import: error
    invalid_annotation_target: ignore
    parameter_assignments: error
    dead_code: error

linter:
  # ये रूल्स सुनिश्चित करते हैं कि कोड साफ और तेज (Fast) चले।
  rules:
    # 🎯 कोडिंग स्टाइल
    - prefer_const_constructors           # परफॉरमेंस के लिए बेस्ट
    - prefer_const_declarations
    - prefer_final_fields                 # डेटा सिक्योरिटी के लिए
    - prefer_single_quotes                # कंसिस्टेंसी के लिए
    - always_declare_return_types         # टाइपिंग में कोई कन्फ्यूजन नहीं
    - cancel_subscriptions                # मेमोरी लीक रोकने के लिए (Stream Guard)
    - close_sinks                         # मेमोरी लीक रोकने के लिए
    
    # 🛠️ आर्किटेक्चर गार्ड
    - avoid_print                         # प्रोडक्शन में प्रिंट्स नहीं होने चाहिए
    - avoid_unnecessary_containers        # कोड को हल्का रखने के लिए
    - use_key_in_widget_constructors      # Flutter विजेट्स की असली पहचान
    - sort_child_properties_last          # कोड पढ़ना आसान बनाने के लिए
    - unnecessary_this                    # फालतू कोड हटाओ
    - library_private_types_in_public_api # प्रोफेशनल API स्ट्रक्चर
    
    # 🚀 एडवांस रूल्स
    - await_only_futures                  # फालतू await हटाओ
    - avoid_void_async                    # Async फंक्शन्स को सही से हैंडल करो
    - prefer_void_to_null
    - unawaited_futures                   # Async एरर्स पकड़ने के लिए
    - test_types_in_equals
    - throw_in_finally
