name: trinetra
description: TriNetra - A Premium Social Super-App (Facebook 2026 Standard)
publish_to: 'none'
version: 1.0.0+1

# ==============================================================
# 👁️🔥 TRINETRA CORE ENGINE (Point 12)
# 100% REAL: Powered by Cloudflare + Appwrite Dual-Engine
# ==============================================================

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── THE MASTER KEY VAULT (17 Keys from GitHub Secrets) ─────
  flutter_dotenv: any

  # ─── DUAL-ENGINE (Appwrite + Cloudflare) ─────
  appwrite: any                  # Appwrite for Auth, DB, and Realtime
  cloudflare_workers: any        # Placeholder for Cloudflare logic if needed via HTTP

  # ─── STATE MANAGEMENT & NAVIGATION ──────────────────────────
  flutter_riverpod: any
  go_router: any

  # ─── UI & ANIMATIONS (Point 1 - Splash & Premium Feel) ───────
  google_fonts: any
  lottie: any
  cached_network_image: any
  shimmer: any
  flutter_animate: any
  pinput: any                   # Asli Phone OTP UI
  country_code_picker: any
  flutter_staggered_animations: any
  flutter_native_splash: any 

  # ─── GATEKEEPER (5+1 Strict Logins - Point 2) ───────────────
  google_sign_in: any 
  sign_in_with_apple: any 
  flutter_facebook_auth: any 
  github_sign_in_plus: any

  # ─── MULTI-AI UNIVERSE (6-in-1 Brain - Point 11) ─────────────
  google_generative_ai: any      # Gemini Power
  http: any 
  flutter_markdown: any          # For AI Code Rendering

  # ─── MEDIA & DOWNLOADS (Point 4 & 5 - Universal Player) ─────
  video_player: any
  chewie: any
  just_audio: any
  image_picker: any
  file_picker: any
  photo_view: any
  record: any                    # Voice Messages
  syncfusion_flutter_pdfviewer: any

  # ─── ECONOMY & PAYMENTS (Point 6) ──────
  payu_checkoutpro_flutter: any
  flutter_paypal: any
  flutter_braintree: any
  adyen_checkout: any
  webview_flutter: any
  in_app_purchase: any

  # ─── MONETIZATION (Point 6 - Ads Ecosystem) ──────────────────
  google_mobile_ads: any
  applovin_max: any
  facebook_audience_network: any

  # ─── MONITORING & CRASH TRACKING (Point 12) ────
  sentry_flutter: any

  # ─── MESSENGER 2.0 & CALLING (Point 5 - WhatsApp Standard) ──
  flutter_webrtc: any
  zego_uikit_prebuilt_call: any 
  flutter_chat_ui: any 
  emoji_picker_flutter: any

  # ─── MULTILANGUAGE & JUSTICE (Point 13) ──────────────────────
  easy_localization: any
  translator: any

  # ─── NETWORKING & SECURE STORAGE ─────────────────────────────
  dio: any
  connectivity_plus: any
  flutter_secure_storage: any
  shared_preferences: any

  # ─── UTILS & AUTO-VERSIONING ─────────────────────────────────
  uuid: any
  timeago: any
  share_plus: any
  url_launcher: any
  intl: any
  path_provider: any
  permission_handler: ^11.3.1
  package_info_plus: any
  device_info_plus: any
  web_socket_channel: any
  mime: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: any

dependency_overrides:
  github_sign_in_plus: any
  flutter_paypal: any
  syncfusion_flutter_pdfviewer: any
  path_provider: any
  http: any
  intl: any

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/locales/ 

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/images/trinetra_master_logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/images/trinetra_master_logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/trinetra_master_logo.png"
  image_path: "assets/images/trinetra_master_logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/trinetra_splash_logo.png"
  android: true
  ios: true
  web: false
