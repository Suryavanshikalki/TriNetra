name: trinetra
description: TriNetra - A Premium Social Super-App (Facebook 2026 Standard)
publish_to: 'none'
version: 1.0.0+1

# ==============================================================
# 👁️🔥 TRINETRA CORE ENGINE (Point 12)
# 100% REAL: Powered by AWS Supreme | Firebase for Domain Only
# ==============================================================

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.26.0' # Facebook 2026 Standard requires latest Flutter

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── THE MASTER KEY VAULT (17 Keys from GitHub Secrets) ─────
  # Yahin se saari 'Asli' keys (AWS, Gemini, Payments) load hongi.
  flutter_dotenv: any

  # ─── AWS SUPREME ENGINE (The 100% Backend - Zero Firebase Logic) ─────
  # TriNetra ka pura dimaag aur data yahan se chalega.
  amplify_flutter: any
  amplify_auth_cognito: any      # 5+1 Strict Logins (AWS Cognito)
  amplify_api: any               # AppSync GraphQL / REST Backend
  amplify_storage_s3: any        # High-Speed Media Storage (Point 4)
  amplify_analytics_pinpoint: any # User Tracking & Campaigns

  # ─── STATE MANAGEMENT & NAVIGATION ──────────────────────────
  flutter_riverpod: any
  go_router: any

  # ─── UI & ANIMATIONS (Point 1 - Splash & Premium Feel) ───────
  google_fonts: any
  lottie: any
  cached_network_image: any
  shimmer: any
  flutter_animate: any
  pinput: any                   # Asli Phone OTP UI
  country_code_picker: any
  flutter_staggered_animations: any
  flutter_native_splash: any 

  # ─── GATEKEEPER (5+1 Strict Logins - Point 2) ───────────────
  google_sign_in: any 
  sign_in_with_apple: any 
  flutter_facebook_auth: any 
  github_sign_in_plus: any       # For Mode B & C AI Developers
  # Microsoft Login is handled via Amplify Cognito Web UI

  # ─── MULTI-AI UNIVERSE (6-in-1 Brain - Point 11) ─────────────
  google_generative_ai: any      # Gemini Power
  http: any 
  flutter_markdown: any          # For AI Code Rendering

  # ─── MEDIA & DOWNLOADS (Point 4 & 5 - Universal Player) ─────
  # Photo, Video, Audio aur PDF asli quality mein download honge.
  video_player: any
  chewie: any
  just_audio: any
  image_picker: any
  file_picker: any
  photo_view: any
  record: any                    # Voice Messages
  syncfusion_flutter_pdfviewer: any

  # ─── ECONOMY & PAYMENTS (Point 6 - NO RAZORPAY/STRIPE) ──────
  # TriNetra's Verified Payment Army
  payu_checkoutpro: any          # 🔥 Asli India Gateway
  flutter_paypal: any            # 🔥 Global Gateway
  flutter_braintree: any         # 🔥 Advanced Adyen/Braintree Logic
  adyen_checkout: any            # 🔥 Global Enterprise Payments
  webview_flutter: any           # 🔥 Paddle & Web-fallback Payment Engine
  in_app_purchase: any           # For iOS & Android Pro Subscriptions

  # ─── MONETIZATION (Point 6 - Ads Ecosystem) ──────────────────
  google_mobile_ads: any         # AdMob
  applovin_max: any             # AppLovin
  facebook_audience_network: any # Meta Ads

  # ─── MONITORING & CRASH TRACKING (Point 12 - AWS Synced) ────
  # Zero Firebase Crashlytics. Pure Sentry & AWS CloudWatch.
  sentry_flutter: any

  # ─── MESSENGER 2.0 & CALLING (Point 5 - WhatsApp Standard) ──
  # Mutual-Only calling logic via WebRTC.
  flutter_webrtc: any
  zego_uikit_prebuilt_call: any 
  flutter_chat_ui: any 
  emoji_picker_flutter: any         # 🔥 FIX: Yahan 'any' lagaya hai error rokne ke liye

  # ─── MULTILANGUAGE & JUSTICE (Point 13) ──────────────────────
  easy_localization: any         # Hindi + English Standard
  translator: any                # AI Translation for Posts

  # ─── NETWORKING & SECURE STORAGE ─────────────────────────────
  dio: any
  connectivity_plus: any
  flutter_secure_storage: any    # Encryption for Wallet & Keys
  shared_preferences: any

  # ─── UTILS & AUTO-VERSIONING ─────────────────────────────────
  uuid: any
  timeago: any
  share_plus: any
  url_launcher: any
  intl: any
  path_provider: any
  permission_handler: any
  package_info_plus: any
  device_info_plus: any
  web_socket_channel: any
  mime: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: any   # Auto-Generate 6-Platform Icons

flutter:
  uses-material-design: true
  generate: true                    # For Auto-generating L10n Files

  assets:
    - .env                          # Yahan tumhari 17 ASLI KEYS load hongi
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/locales/ 

# ==============================================================
# 🔥 BRANDING ENGINE (Auto-Generated via Terminal)
# ==============================================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/images/trinetra_master_logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/images/trinetra_master_logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/trinetra_master_logo.png"
  image_path: "assets/images/trinetra_master_logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/trinetra_splash_logo.png"
  android: true
  ios: true
  web: false # Web uses CSS for splash
