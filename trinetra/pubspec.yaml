name: trinetra
description: TriNetra - A Premium Social Super-App (Facebook 2026 Standard)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── Firebase ────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.3
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3
  firebase_app_check: ^0.3.1+3

  # ─── State Management & Navigation ──────────────────────────
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1

  # ─── UI & Animations ────────────────────────────────────────
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  pinput: ^5.0.0
  country_code_picker: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # ─── AI ─────────────────────────────────────────────────────
  google_generative_ai: ^0.4.6

  # ─── Media ──────────────────────────────────────────────────
  video_player: ^2.9.2
  chewie: ^1.8.5
  just_audio: ^0.9.40
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  photo_view: ^0.15.0

  # ─── PDF ─────────────────────────────────────────────────────
  syncfusion_flutter_pdfviewer: ^33.1.44

  # ─── Payments ────────────────────────────────────────────────
  flutter_stripe: ^10.2.0
  razorpay_flutter: ^1.3.8

  # ─── Ads ─────────────────────────────────────────────────────
  google_mobile_ads: ^5.2.0

  # ─── Monitoring / Error Tracking ────────────────────────────
  sentry_flutter: ^8.6.0

  # ─── WebRTC ──────────────────────────────────────────────────
  flutter_webrtc: ^0.14.1

  # ─── Networking & Storage ────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.1.0
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # ─── Utils ───────────────────────────────────────────────────
  uuid: ^4.5.1
  timeago: ^3.7.0
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  intl: ^0.20.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  mime: ^1.0.6
  # 🚀 FIXED: Upgraded version to resolve incompatibility with cached_network_image_web
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/

  # Fonts are served via google_fonts package (no local font files needed)
