name: trinetra
description: TriNetra - A Premium Social Super-App (Facebook 2026 Standard)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── AWS AMPLIFY (The 100% Backend Engine - Firebase Khatm) ─────
  amplify_flutter: ^2.4.0
  amplify_auth_cognito: ^2.4.0      
  amplify_api: ^2.4.0               
  amplify_storage_s3: ^2.4.0        

  # ─── State Management & Navigation ──────────────────────────
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1

  # ─── UI & Animations (Point 1 - Splash Screen & Logo) ───────
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  pinput: ^5.0.0
  country_code_picker: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_native_splash: ^2.4.1 

  # ─── Gatekeeper (5+1 Strict Logins - Point 2) ───────────────
  google_sign_in: ^6.2.1 
  sign_in_with_apple: ^3.3.0 
  flutter_facebook_auth: ^7.0.0 
  github_sign_in_plus: ^0.2.2 

  # ─── AI (6-in-1 Brain - Point 11) ───────────────────────────
  google_generative_ai: ^0.4.6
  http: ^1.2.0 
  flutter_markdown: ^0.7.3 

  # ─── Media & Downloads (Point 4 & 5) ────────────────────────
  video_player: ^2.9.2
  chewie: ^1.8.5
  just_audio: ^0.9.40
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  photo_view: ^0.15.0
  record: ^5.0.5 
  
  # ─── PDF ─────────────────────────────────────────────────────
  syncfusion_flutter_pdfviewer: ^33.1.44

  # ─── Ads & Economy (Point 6 - THE ASLI GATEWAYS INJECTED) ────
  google_mobile_ads: ^5.2.0
  applovin_max: ^3.10.0 
  facebook_audience_network: ^1.0.1 
  flutter_paypal: ^0.1.5 
  in_app_purchase: ^3.2.0 
  # 🔥 JODA GAYA: 4 Missing Asli Gateways (Blueprint ke hisaab se)
  payu_checkoutpro: ^1.2.2       # 🔥 PayU India
  flutter_braintree: ^2.4.2      # 🔥 Braintree
  adyen_checkout: ^1.1.0         # 🔥 Adyen
  webview_flutter: ^4.8.0        # 🔥 Paddle Web Checkout ke liye (Kyunki Paddle ka direct native SDK nahi hai)

  # ─── Monitoring / Error Tracking (Point 12H) ────────────────
  sentry_flutter: ^8.6.0

  # ─── WebRTC & Calling (Point 5 - WhatsApp 2.0) ──────────────
  flutter_webrtc: ^0.14.1
  zego_uikit_prebuilt_call: ^4.1.6 

  # ─── Chat UI (Point 5) ──────────────────────────────────────
  flutter_chat_ui: ^1.6.9 
  emoji_picker_flutter: ^3.1.2 

  # ─── Multilanguage & Translation (Point 13) ─────────────────
  easy_localization: ^3.0.7 
  translator: ^0.1.7 

  # ─── Networking & Storage ────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # 🔥 The Master Fix: Flutter will automatically solve versions 🔥
  web_socket_channel: any
  mime: any

  # ─── Utils ───────────────────────────────────────────────────
  uuid: ^4.5.1
  timeago: ^3.7.0
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  intl: ^0.20.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/locales/ 
