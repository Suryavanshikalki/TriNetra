name: TriNetra Final - All OS Platforms & Dual-Engine Launch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # 1. ANDROID BUILD 🟢
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter clean
          flutter pub get
          
          flutter build apk --release -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
          flutter build appbundle --release -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Save Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  # 2. WINDOWS BUILD 🔵
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows EXE
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter config --enable-windows-desktop
          flutter clean
          flutter pub get
          flutter build windows --release -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: '**/build/windows/x64/runner/Release/'

  # 3. LINUX BUILD 🟣
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter config --enable-linux-desktop
          flutter clean
          flutter pub get
          flutter build linux --release -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: '**/build/linux/x64/release/bundle/'

  # 4. iOS BUILD 🔴 
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter clean
          flutter pub get
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          flutter build ios --release --no-codesign -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload iOS Artifact (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Release-Unsigned
          path: '**/build/ios/iphoneos/Runner.app'

  # 5. macOS BUILD 🟠
  build-macos:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build macOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter config --enable-macos-desktop
          flutter clean
          flutter pub get
          export MACOSX_DEPLOYMENT_TARGET=10.15
          flutter build macos --release -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: '**/build/macos/Build/Products/Release/*.app'

  # 6. WEB PWA & DEPLOY 🟡
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Web PWA
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter clean
          flutter pub get
          flutter build web --release -v \
            --dart-define=APPWRITE_ENDPOINT="${{ secrets.APPWRITE_ENDPOINT }}" \
            --dart-define=APPWRITE_PROJECT_ID="${{ secrets.APPWRITE_PROJECT_ID }}" \
            --dart-define=CLOUDFLARE_WORKER_URL="${{ secrets.CLOUDFLARE_WORKER_URL }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-Release
          path: '**/build/web/'
