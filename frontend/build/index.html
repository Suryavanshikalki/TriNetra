<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TriNetra</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 48px 40px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        max-width: 420px;
        width: 90%;
      }
      .logo {
        width: 72px;
        height: 72px;
        background: linear-gradient(135deg, #1877F2, #0D5FCC);
        border-radius: 20px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }
      h1 { color: #1877F2; font-size: 32px; font-weight: 900; margin-bottom: 8px; }
      p { color: #65676B; font-size: 16px; margin-bottom: 24px; }
      .badge {
        display: inline-block;
        background: #E7F3FF;
        color: #1877F2;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .info { color: #90939B; font-size: 12px; margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">👁️</div>
      <h1>TriNetra</h1>
      <p>India's Premium Social Super-App</p>
      <div class="badge">Flutter App — Build in Progress</div>
      <p style="font-size:14px; margin-top:12px;">
        The TriNetra Flutter app is being compiled.<br/>
        Run <code>flutter build web</code> and deploy to see the full app.
      </p>
      <p class="info">Backend AI API is live at /api/ai/translate and /api/ai/chat</p>
    </div>
  </body>
</html>
