name: TriNetra - 100% AWS & Auto-Clean Launch
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # --- 1. GLOBAL AUTO-CLEANER & ANDROID ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: 🧹 MASTER AUTO-CLEANER (Removing Firebase & Razorpay from Code)
        run: |
          echo "🔥 Starting deep scan of 57+ files..."
          # Remove Firebase and Razorpay Imports
          find lib -name "*.dart" -exec sed -i '/import.*firebase/d' {} +
          find lib -name "*.dart" -exec sed -i '/import.*razorpay/d' {} +
          
          # Comment out Initialization code
          find lib -name "*.dart" -exec sed -i 's/Firebase.initializeApp/\/\/ Firebase.initializeApp/g' {} +
          find lib -name "*.dart" -exec sed -i 's/Razorpay()/\/\/ Razorpay()/g' {} +
          find lib -name "*.dart" -exec sed -i 's/FirebaseMessaging/\/\/ FirebaseMessaging/g' {} +
          echo "✅ All files cleaned successfully!"

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          flutter build apk --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"
      - name: Save Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  # --- 2. WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - name: Build Windows
        shell: bash
        run: |
          # Clean code on Windows using PowerShell equivalent if needed, but Flutter defines handle most logic
          flutter build windows --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: '**/build/windows/x64/runner/Release/'

  # --- 3. iOS BUILD (Master Clean) ---
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: 🧹 MASTER AUTO-CLEANER (iOS Mode)
        run: |
          find lib -name "*.dart" -exec sed -i '' '/import.*firebase/d' {} +
          find lib -name "*.dart" -exec sed -i '' '/import.*razorpay/d' {} +
          find lib -name "*.dart" -exec sed -i '' 's/Firebase.initializeApp/\/\/ Firebase.initializeApp/g' {} +
      - name: Force Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
      - uses: subosito/flutter-action@v2
      - name: Build iOS
        shell: bash
        run: |
          flutter pub get
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} + || true
          flutter build ios --release --no-codesign \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"

  # --- 4. macOS BUILD ---
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: 🧹 MASTER AUTO-CLEANER (macOS Mode)
        run: |
          find lib -name "*.dart" -exec sed -i '' '/import.*firebase/d' {} +
          find lib -name "*.dart" -exec sed -i '' 's/Firebase.initializeApp/\/\/ Firebase.initializeApp/g' {} +
      - uses: subosito/flutter-action@v2
      - name: Build macOS
        shell: bash
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}"
      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: '**/build/macos/Build/Products/Release/*.app'

  # --- 5. LINUX BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev
      - uses: subosito/flutter-action@v2
      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}"
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: '**/build/linux/x64/release/bundle/'

  # --- 6. WEB PWA & AWS S3 DEPLOY (Firebase Removed) ---
  deploy-web-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🧹 MASTER AUTO-CLEANER (Web Mode)
        run: |
          find lib -name "*.dart" -exec sed -i '/import.*firebase/d' {} +
          find lib -name "*.dart" -exec sed -i 's/Firebase.initializeApp/\/\/ Firebase.initializeApp/g' {} +
      - uses: subosito/flutter-action@v2
      - name: Build Web
        shell: bash
        run: |
          flutter build web --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"
      - name: Deploy to AWS S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          cd build/web
          aws s3 sync . s3://trinetra-web-app --delete
