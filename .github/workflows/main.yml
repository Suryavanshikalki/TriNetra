              "import 'package:plaid_flutter/plaid_flutter.dart';\nclass BankService {\n  static Future<void> linkBankAccount() async {\n    final plaid = PlaidFlutter();\n    await plaid.openLink();\n  }\n  static Future<void> requestPayout(String userId, double amount) async {\n    // Trigger cloud function to process payout\n  }\n}")

