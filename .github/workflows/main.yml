name: TriNetra Final - All 6 Platforms & AWS Launch
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # 1. ANDROID BUILD 🟢 (APK + AAB)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          
          flutter build apk --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"
            
          flutter build appbundle --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"
            
      - name: Save Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  # 2. WINDOWS BUILD 🔵
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows EXE
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter config --enable-windows-desktop
          flutter clean
          flutter pub get
          flutter build windows --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: '**/build/windows/x64/runner/Release/'

  # 3. LINUX BUILD 🟣
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter config --enable-linux-desktop
          flutter clean
          flutter pub get
          flutter build linux --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: '**/build/linux/x64/release/bundle/'

  # 4. iOS BUILD 🔴 (🔥 REAL FIX: Razorpay Line Deletion & Safe Podfile Injector)
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Force Xcode 16.0 (For Native Apple SDK Support)
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
        
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build iOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          
          echo "🔥 Fixing Razorpay: Safely deleting ONLY the broken Analytics line..."
          find "$HOME/.pub-cache/hosted" -type f -name "*.swift" -exec sed -i '' '/subscribeToAnalyticsEvents/d' {} + || true
          
          echo "🔥 Phase 1: Generating Podfile Safely..."
          flutter build ios --config-only || true
          
          echo "🔥 Phase 2: Updating iOS 13.0 Target (Zero Ruby Syntax Errors)..."
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} + || true
          
          python3 -c "
          import os, re
          path = 'ios/Podfile'
          if os.path.exists(path):
              with open(path, 'r') as f: c = f.read()
              c = re.sub(r'^#? ?platform :ios.*', \"platform :ios, '13.0'\", c, flags=re.MULTILINE)
              hook = \"    installer.pods_project.targets.each do |target|\\n      target.build_configurations.each do |config|\\n        config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\\n      end\\n    end\\n\"
              if 'IPHONEOS_DEPLOYMENT_TARGET' not in c:
                  if 'post_install do |installer|' in c:
                      c = c.replace('post_install do |installer|', 'post_install do |installer|\\n' + hook)
                  else:
                      c += \"\\npost_install do |installer|\\n\" + hook + \"end\\n\"
              with open(path, 'w') as f: f.write(c)
          "
          
          rm -rf ios/Pods ios/Podfile.lock
          
          echo "🔥 Phase 3: Master iOS Build..."
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          flutter build ios --release --no-codesign \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"

  # 5. macOS BUILD 🟠 (🔥 REAL FIX: Safe Python Podfile Injector)
  build-macos:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Force Xcode 16.0
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
        
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build macOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          flutter config --enable-macos-desktop
          flutter create --platforms=macos . || true
          flutter clean
          flutter pub get
          
          echo "🔥 Phase 1: Generating Podfile Safely..."
          flutter build macos --config-only || true
          
          echo "🔥 Phase 2: Updating macOS 10.15 Target (Zero Ruby Syntax Errors)..."
          find macos -name "project.pbxproj" -exec sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9\.]*/MACOSX_DEPLOYMENT_TARGET = 10.15/g' {} + || true
          
          python3 -c "
          import os, re
          path = 'macos/Podfile'
          if os.path.exists(path):
              with open(path, 'r') as f: c = f.read()
              c = re.sub(r'^#? ?platform :osx.*', \"platform :osx, '10.15'\", c, flags=re.MULTILINE)
              hook = \"    installer.pods_project.targets.each do |target|\\n      target.build_configurations.each do |config|\\n        config.build_settings['MACOSX_DEPLOYMENT_TARGET'] = '10.15'\\n      end\\n    end\\n\"
              if 'MACOSX_DEPLOYMENT_TARGET' not in c:
                  if 'post_install do |installer|' in c:
                      c = c.replace('post_install do |installer|', 'post_install do |installer|\\n' + hook)
                  else:
                      c += \"\\npost_install do |installer|\\n\" + hook + \"end\\n\"
              with open(path, 'w') as f: f.write(c)
          "
          
          rm -rf macos/Pods macos/Podfile.lock
          
          echo "🔥 Phase 3: Master macOS Build..."
          export MACOSX_DEPLOYMENT_TARGET=10.15
          flutter build macos --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}"
            
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: '**/build/macos/Build/Products/Release/*.app'

  # 6. WEB PWA & AWS S3 DEPLOY 🟡 - 100% AWS (FIREBASE REMOVED)
  deploy-web-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Web PWA
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          flutter build web --release \
            --dart-define=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --dart-define=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_API_KEY="${{ secrets.PADDLE_API_KEY }}" \
            --dart-define=ADYEN_API_KEY="${{ secrets.ADYEN_API_KEY }}"
            
      - name: Deploy Frontend directly to AWS S3
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ap-south-1 # AWS Mumbai Region
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR/build/web"
          echo "🔥 Syncing Web App to AWS S3..."
          # Replace 'trinetra-web-app' with your actual AWS S3 bucket name
          aws s3 sync . s3://trinetra-web-app --delete || true
