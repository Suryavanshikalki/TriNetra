name: TriNetra Final - All 6 Platforms & AWS Launch
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # 1. ANDROID BUILD 🟢
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          
          flutter build apk --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
          flutter build appbundle --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Save Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  # 2. WINDOWS BUILD 🔵
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows EXE
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter config --enable-windows-desktop
          flutter clean
          flutter pub get
          flutter build windows --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: '**/build/windows/x64/runner/Release/'

  # 3. LINUX BUILD 🟣
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter config --enable-linux-desktop
          flutter clean
          flutter pub get
          flutter build linux --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: '**/build/linux/x64/release/bundle/'

  # 4. iOS BUILD 🔴
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Force Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          
          echo "🔥 Fixing device_info_plus Vision Pro bug safely..."
          find ~/.pub-cache/hosted -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/isiOSAppOnVision/isMacCatalystApp/g' {} + || true
          
          echo "🔥 Safe iOS Deployment Target (For AWS Amplify)..."
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} + || true
          
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          flutter build ios --release --no-codesign \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      
      - name: Upload iOS Artifact (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Release-Unsigned
          path: '**/build/ios/iphoneos/Runner.app'

  # 5. macOS BUILD 🟠
  build-macos:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Force Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build macOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          flutter config --enable-macos-desktop
          flutter create --platforms=macos . || true
          flutter clean
          flutter pub get
          
          echo "🔥 Safe macOS Deployment Target (For AWS Amplify)..."
          find macos -name "project.pbxproj" -exec sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9\.]*/MACOSX_DEPLOYMENT_TARGET = 10.15/g' {} + || true
          
          export MACOSX_DEPLOYMENT_TARGET=10.15
          flutter build macos --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}"
            
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: '**/build/macos/Build/Products/Release/*.app'

  # 6. WEB PWA & AWS S3 DEPLOY 🟡
  deploy-web-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Web PWA
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          flutter build web --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Deploy Frontend to AWS S3 Bucket
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR/build/web"
          echo "🔥 Syncing Web App directly to AWS S3 Bucket..."
          aws s3 sync . s3://trinetra-web-app --delete || true
