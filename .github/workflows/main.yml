name: TriNetra Final - All 6 Platforms & Stores
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          flutter clean
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release
      - name: Save Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows EXE
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-windows-desktop
          flutter clean
          flutter pub get
          flutter build windows --release
      - name: Package Windows build
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR/build/windows/x64/runner/Release"
          7z a "$GITHUB_WORKSPACE/trinetra_windows.zip" .
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: trinetra_windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux App
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-linux-desktop
          flutter clean
          flutter pub get
          flutter build linux --release
      - name: Package Linux build
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          tar -czf trinetra_linux.tar.gz -C "$APP_DIR/build/linux/x64/release/bundle" .
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: trinetra_linux.tar.gz

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS (No Codesign)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build macOS
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-macos-desktop
          flutter clean
          flutter pub get
          flutter build macos --release
      - name: Package macOS build
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR/build/macos/Build/Products/Release"
          zip -r "$GITHUB_WORKSPACE/trinetra_macos.zip" *.app
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: trinetra_macos.zip

  deploy-web-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Web PWA & Deploy to Firebase
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          flutter build web --release

          cd $GITHUB_WORKSPACE
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json

          FIREBASE_DIR=$(dirname $(find . -name "firebase.json" | head -n 1))
          cd "$FIREBASE_DIR"
          firebase deploy --only hosting
          rm $GITHUB_WORKSPACE/sa.json
