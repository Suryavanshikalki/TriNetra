name: TriNetra Final - All 6 Platforms & Firebase Launch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # ----------------------------------------------------------------------
  # 1. WEB + FIREBASE DEPLOY
  # ----------------------------------------------------------------------
  deploy-web-firebase:
    runs-on: ubuntu-latest
    env:
      S_AWS_ACCESS: ${{ secrets.AWS_ACCESS_KEY_ID }}
      S_AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S_AWS_ARN: ${{ secrets.AWS_APP_RUNNER_ARN }}
      S_SENTRY: ${{ secrets.SENTRY_DSN }}
      S_ZEGO_ID: ${{ secrets.ZEGOCLOUD_APP_ID }}
      S_ZEGO_SIGN: ${{ secrets.ZEGOCLOUD_APP_SIGN }}
      S_GEMINI: ${{ secrets.GEMINI_API_KEY }}
      S_OPENAI: ${{ secrets.OPENAI_API_KEY }}
      S_META: ${{ secrets.META_API_KEY }}
      S_DEEPSEEK: ${{ secrets.DEEPSEEK_API_KEY }}
      S_MANUS: ${{ secrets.MANUS_API_KEY }}
      S_EMERGENT: ${{ secrets.EMERGENT_API_KEY }}
      S_PAYU: ${{ secrets.PAYU_MERCHANT_KEY }}
      S_BRAINTREE: ${{ secrets.BRAINTREE_TOKEN }}
      S_PAYPAL_C: ${{ secrets.PAYPAL_CLIENT_ID }}
      S_PADDLE: ${{ secrets.PADDLE_KEY }}
      S_ADYEN: ${{ secrets.ADYEN_KEY }}
      S_FIREBASE: ${{ secrets.FIREBASE_CONFIG }}
      S_FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      S_GH_PAT: ${{ secrets.GH_PAT_TOKEN }}
      S_GOOGLE: ${{ secrets.GOOGLE_VERIFICATION }}
      S_GROQ: ${{ secrets.GROQ_API_KEY }}
      S_MONGO: ${{ secrets.MONGODB_URI }}
      S_PAYPAL_S: ${{ secrets.PAYPAL_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }

      - name: 🤖 AUTO-GENERATE FULL APP & FIX ALL ERRORS (AI HEALING AGENT)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          mkdir -p assets/images web lib/core/config

          # ---------- पूरा TriNetra Blueprint (AppLovin से लेकर अंत तक) ----------
          cat << 'EOF' > lib/core/config/trinetra_master_blueprint.dart
          class TriNetraBlueprint {
            static const String infrastructureRules = r'''
          Applovin +admob+meta ads,paypal,windows mac iOS android app store par,domain,aws waf aws cloudwatch auto scaling,sentry,crashlytics,logrocket 
          Sara key asli h aur bhi key h screenshot de rha hu dekho aur jo jo de rha hu pahle bhi diya hu mujhe frontend backend dono ko aws se chalana h aur jitna key h sbka use karke jaise jaise bola hu sab kuchh asli kam karne vala chahiye pahle bhi bola hu kuchh bhi dummy nhi sirf dikhe sab kuchh asli kam karne vala facebook ki tarah a to z jo jo jaise jaise bola hu a to z kuchh bhi nhi chhodo ek ek option function feature settings privacy security menu ek ek chiz jo jo text me de rha hu likhkar sab kuchh jaise jaise hai jitna hai sab kuchh rhega asli kam karega surf dikhega nhi sara text ka ek ek line pdho kuchh bhi nhi chhodo a to z fully functional ho sara key aur sab kuchh likhkar de rha hu original h vaisa hi banao facebook ki tarah asli kan karne vala web app dono par jo jo jaise jaise likha hu vaise apna man se kuchh nhi krna deep search karo aur dekho pahle tum same tum same sab kuchh likho aur fir coding shuru karenge bologe to sara file ka screenshot bhi de dunga kaun kaun sa h ya tumko pata h sab yad karo sab kuchh aur banao facebook ki tarah asli kam karne vala jo jo h isme
          ''';

            static const String ultimateBlueprintText = r'''
          👁️🔥 TriNetra Super App: The 100% Ultimate Blueprint
          1. ऐप की पहचान और 6-प्लेटफॉर्म डिप्लॉयमेंट (The Foundation)
          • यूनिवर्सल लोगो: TriNetra का लोगो फिक्स रहेगा logo bhi tum banaoge khud jaise chatgpt facebook ka h lekin iska apna logo bnana। App Store, Windows, macOS, Linux, Android, iOS और वेबसाइट—सब जगह नाम के साथ लोगो दिखेगा ताकि असली ऐप की पहचान हो।
          • स्प्लैश स्क्रीन: ऐप खोलते ही 2 सेकंड के लिए स्क्रीन पर TriNetra का नाम और लोगो आएगा।
          • वेबसाइट डाउनलोड हब: ऐप स्टोर से पहले, वेबसाइट पर 6 प्लेटफॉर्म (Android, iOS PWA, Windows, macOS, Linux, Web) के डायरेक्ट इंस्टॉल लिंक होंगे। वेब पर डाउनलोड लिंक रहेगा जिससे असली ऐप डाउनलोड होगा। अपडेट होने पर वेब लिंक और स्टोर दोनों जगह खुद अपडेट होगा।
          • ऑटो-डिटेक्ट OS: यूज़र जिस डिवाइस (जैसे Windows या Android) से वेबसाइट खोलेगा, उसी का डाउनलोड लिंक सबसे ऊपर हाईलाइट होगा। फोन/सिस्टम स्टोरेज में डाउनलोड होकर सीधे इंस्टॉल होगा।
          • वेब वर्ज़न: ऐप जैसा ही 100% सेम टू सेम वेब पर भी चलेगा। बस वेब पर एक 'Download' का एक्स्ट्रा बटन होगा जो ऐप के अंदर नहीं होगा।
          • ऑटो-अपडेट: ऐप में कोई भी बदलाव होने पर वेब लिंक खुद अपडेट होगा और सभी डिवाइस/स्टोर्स पर यूज़र्स को ऑटोमैटिक अपडेट (OTA) मिल जाएगा।
          2. गेटकीपर (लॉगिन और अकाउंट)
          • स्ट्रिक्ट एंट्री: बिना लॉगिन या बिना OTP के कोई ऐप में नहीं जा पाएगा। कोई 'Skip' बटन नहीं होगा।
          • लॉगिन के 5 तरीके: मोबाइल नंबर (OTP), Email, Google, Apple, Microsoft।
          • GitHub लॉगिन: सिर्फ AI कोडिंग के लिए। GitHub से लॉगिन करने पर सिर्फ AI सेक्शन खुलेगा। बाकी 5 तरीकों से पूरा ऐप (Social + AI) खुलेगा।
          • परमानेंट TriNetra ID: लॉगिन करते ही परमानेंट ID बनेगी।
          3. प्रोफाइल और प्राइवेसी
          • डिज़ाइन: Facebook/Insta की तरह प्रोफाइल फोटो (कैमरा/गैलरी से), कवर बैकग्राउंड, और Bio। (स्किप का ऑप्शन रहेगा)।
          • अवतार: 3D अवतार बनाने का ऑप्शन।
          • कनेक्शन रूल: Follow/Unfollow, Block/Unblock. कोई फॉलो करेगा तो फ्रेंड लिस्ट में नोटिफिकेशन जाएगा। एक्सेप्ट करने पर ही वो पोस्ट, मैसेज या कॉल कर पाएगा। (Mutual Connection)।
          4. होम स्क्रीन (फीड, मार्केटप्लेस और ऑटो-एस्केलेशन सिस्टम)
          • मीडिया सपोर्ट और यूनिवर्सल डाउनलोड: Feed, Group, Page या Story/Reels में Text, Photo, Video, Audio, Mic (Voice), Camera और PDF सब अपलोड होगा। ऐप में जहाँ भी कोई मीडिया अपलोड होगा, उसे हर यूज़र ओरिजिनल फॉर्मेट में डाउनलोड कर सकेगा।
          • इन-बिल्ट प्लेयर: वीडियो, ऑडियो और PDF ऐप के अंदर ही चलेंगे/पढ़े जाएंगे।
          • कमेंट बॉक्स पावर: कमेंट में Text, Photo, Video, Audio, Mic, Camera, PDF, Stickers, Emoji, GIFs सब भेजा जा सकेगा और डाउनलोड भी होगा।
          • मार्केटप्लेस: सामान खरीदने और बेचने का डेडिकेटेड सेक्शन।
          • स्टोरी & रील्स: 24 घंटे वाली स्टोरी और फुल-स्क्रीन स्वाइप-अप रील्स प्लेयर।
          • 🚨 ऑटो-एस्केलेशन (कंप्लेंट/सुधार) सिस्टम:
          • अगर किसी कमेंट/पोस्ट पर बहुत बहस या चर्चा है जो "विकास" या "सुधार" से जुड़ी है, तो सिस्टम उसे ट्रैक करेगा।
          • अगर समाधान नहीं हुआ, तो सिस्टम ऑटोमैटिक मैसेज/कंप्लेंट ज़िम्मेदार व्यक्ति को भेजेगा।
          • चैन ऑफ़ कमांड: यह कंप्लेंट उस कैटेगरी के अनुसार जाएगी जिससे वो रिलेटेड है (जैसे क्रिकेट का है तो क्रिकेट अथॉरिटी को, राजनीति का है तो राजनीतिक अधिकारी को)। अगर सुधार नहीं हुआ, तो यह स्टेप-बाय-स्टेप लोकल अधिकारी ➡️ MLA ➡️ CM ➡️ PM ➡️ सिविल कोर्ट ➡️ हाई कोर्ट ➡️ सुप्रीम कोर्ट ➡️ इंटरनेशनल लेवल तक तब तक बढ़ेगा जब तक मामला सॉल्व नहीं होता :- 30000/month
          5. मैसेंजर (WhatsApp 2.0)
          • मैसेज रूल: सिर्फ म्यूचुअल फॉलोवर्स ही एक-दूसरे को मैसेज कर पाएंगे। अनफॉलो करते ही मैसेज बंद।
          • चैट बॉक्स: Send बटन के साथ Mic (Voice Note) का ऑप्शन होगा। + आइकॉन से Text, Photo, Video, Audio, PDF, Contact, Gallery, Camera, Location, Stickers, Emoji, GIF, Avatar सब भेजा जाएगा।
          • चैट मीडिया: चैट में आया हर मीडिया डाउनलोड होगा और ऐप के अंदर ही प्ले/रीड होगा।
          • कॉलिंग: चैट के ऊपर Audio और Video कॉल का बटन।
          • ग्रुप्स: ग्रुप चैट और ग्रुप ऑडियो/वीडियो कॉलिंग।
          • AI की नो-एंट्री: चैट में AI का कोई टॉगल या ऑप्शन नहीं होगा।
          • 🚨 कल्कि ओनर चैट (Kalki Owner Chat): Messenger के अंदर एक मेरा नाम का ऑप्शन होगा: *kalki* (Professional Owner)। इसमें सिर्फ मैं (Kalki) सबसे बात कर सकूँगा। दुनिया का हर यूजर मुझसे डायरेक्ट असली बात करेगा। इसमें भी सब कुछ (Photo, Video, PDF, Mic) भेजना और डाउनलोड करना असली काम करेगा।
          6. द इकॉनमी (Monetization, Boost & Wallet)
          • Wallet & Payment History: किसने कितना पे किया, कहाँ से पैसा आया, यह पूरा डेटा यूज़र खुद देख सकेगा। (पेमेंट गेटवे: PayU India, Braintree + PayPal, Paddle, Adyen सपोर्टेड। Razorpay हमेशा के लिए हटा दिया गया है)।
          • पैसों का फ्लो: AI का रिचार्ज, पोस्ट बूस्ट या मॉनेटाइज़ेशन के लिए जो पैसा यूज़र पे करेगा, वो सीधे मेरे (TriNetra के) बैंक अकाउंट में आएगा। यूज़र अपनी कमाई (Wallet) से अपने बैंक में खुद ट्रांसफर कर सकेगा।
          • कस्टमर सपोर्ट: सेटिंग्स में 'Customer Support' होगा जहाँ पेमेंट या ऐप से जुड़ी कोई भी दिक्कत सॉल्व होगी।
          • 4 बूस्ट और रेवेन्यू मॉडल:
          7. Free Boost (70/30): यूज़र फ्री में पोस्ट बूस्ट करेगा। एड्स चलेंगे। कमाई का 70% TriNetra (मेरा) और 30% यूज़र का।
          8. Paid Boost (बिना मॉनेटाइज़ेशन - 25/75): यूज़र पैसा देकर बूस्ट करेगा। जो भी रीच/फायदा होगा, उसका 25% TriNetra (मेरा) और 75% यूज़र का :- 349/day or 10000/month
          9. Paid Boost + Monetization (100% यूज़र): यूज़र पैसा देकर बूस्ट भी करेगा और मॉनेटाइज़ भी। इसकी 100% पूरी कमाई यूज़र की होगी :-20000/month or 799/day
          10. Pro Auto-Boost (राजनीति/मार्केटिंग): यह सिस्टम इंटरेस्ट के अनुसार ऑटोमैटिकली सही लोगों को ढूंढकर फॉलोवर्स बढ़ाएगा। फुल सर्विस ₹28000/महीना। (कम पैसे में लिमिटेड सर्विस)। इसमें कमाई का 70% यूज़र को और 30% TriNetra को जाएगा।
          11. मास्टर AI (द अल्टीमेट 6-इन-1 ब्रेन & OS मेकर)
          • अलग पहचान: होम स्क्रीन पर बीच में एक अलग, बड़ा AI लोगो।
          • 6 AI पर्दे के पीछे: Meta, ChatGPT, Gemini, DeepSeek, Manus, Emergent। यूज़र इन्हें चुन नहीं पाएगा, ये बैकग्राउंड में खुद स्विच होंगे।
          • इनपुट/आउटपुट: चैट बॉक्स में Text, Photo, Video, Audio, Gallery, Camera, PDF और Mic का ऑप्शन। आउटपुट में सब कुछ डाउनलोड होगा और इन-बिल्ट प्लेयर में खुलेगा।
          • सब्सक्रिप्शन टाइमिंग: 1, 3, 6, 9, और 12 महीने के रिचार्ज ऑप्शन।
          • AI मोड्स और रिचार्ज सिस्टम:
          • मोड A: Chatbot (GPT/Gemini/DeepSeek/Meta लेवल)
          • Free Lifetime: सिर्फ Meta AI की तरह बेसिक काम।
          • Free Premium: फुल पावर, लेकिन रोज़ के 8 मैसेज फ्री।
          • Paid: रिचार्ज रहने तक अनलिमिटेड पावर 2499/month
          • मोड B: Agentic AI (Manus/Emergent लेवल)
          • Free: लॉगिन करने पर सिर्फ़ एक बार 20 क्रेडिट मिलेगा, फिर हमेशा के लिए पेड।
          • Paid (Standard): एक महीने के रिचार्ज में सिर्फ 300 क्रेडिट मिलेंगे, डेली नहीं। सिर्फ एक बार मिलेगा, वो चाहे एक दिन में ख़त्म हो जाये फिर हमेशा के लिए पेड (ऐप, कोडिंग, GitHub अपलोड के लिए) 2999/month
          • मोड C: Super Agentic AI (Human-Brain Level)
