name: TriNetra Ultimate - 6 Platforms & Firebase Launch
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy-all:
    name: Build All 6 Platforms & Deploy Web Hub
    runs-on: macos-latest # एक ही Mac मशीन पर सब कुछ बनेगा (Apple के लिए ज़रूरी)
    timeout-minutes: 90
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 3. Install Universal Dependencies
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter clean
          flutter pub get

      # ═══ BUILD SECTION ═══════════════════════════════
      
      - name: 🟢 Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          flutter build apk --release
          flutter build appbundle --release

      - name: 🔵 Build Windows (EXE)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: 🟠 Build macOS (DMG)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-macos-desktop
          flutter build macos --release

      - name: 🟣 Build Linux
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: 🔴 Build iOS (No Codesign)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter build ios --release --no-codesign

      - name: 🟡 Build Web PWA
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter build web --release

      # ═══ ARTIFACTS SECTION (Downloadable Files) ═══════
      
      - name: 📦 Save All Release Files
        uses: actions/upload-artifact@v4
        with:
          name: TriNetra-All-Platforms
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab
            **/build/windows/x64/runner/Release/
            **/build/macos/Build/Products/Release/*.app
            **/build/linux/x64/release/bundle/
            **/build/web/

      # ═══ DEPLOY SECTION (Firebase Hub) ════════════════
      
      - name: 🚀 Deploy Universal Hub to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: trinetra-8b846 # यहाँ आपकी असली Firebase ID (Project ID)
          channelId: live
