name: TriNetra — Build All Platforms & Deploy

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: 'false'

env:
  FLUTTER_VERSION: '3.41.2'

# ═══════════════════════════════════════════════════════════════════
# HELPER: Detect Flutter project root (root OR trinetra/ subdir)
# Sets PROJ env var used by all subsequent steps in that job.
# ═══════════════════════════════════════════════════════════════════

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build Flutter Web (PWA) — no deploy yet
  # ─────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV && echo "Found at root"
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV && echo "Found at trinetra/"
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Parse Firebase Config
        run: |
          echo '${{ secrets.FIREBASE_CONFIG }}' > /tmp/fc.json
          echo "FIREBASE_WEB_API_KEY=$(jq -r '.apiKey // empty' /tmp/fc.json)"            >> $GITHUB_ENV
          echo "FIREBASE_WEB_APP_ID=$(jq -r '.appId // empty' /tmp/fc.json)"              >> $GITHUB_ENV
          echo "FIREBASE_SENDER_ID=$(jq -r '.messagingSenderId // empty' /tmp/fc.json)"   >> $GITHUB_ENV
          echo "FIREBASE_PROJECT_ID=$(jq -r '.projectId // "trinetra-8b846"' /tmp/fc.json)" >> $GITHUB_ENV
          echo "FIREBASE_AUTH_DOMAIN=$(jq -r '.authDomain // "trinetra-8b846.firebaseapp.com"' /tmp/fc.json)" >> $GITHUB_ENV
          echo "FIREBASE_STORAGE_BUCKET=$(jq -r '.storageBucket // "trinetra-8b846.appspot.com"' /tmp/fc.json)" >> $GITHUB_ENV
          echo "FIREBASE_MEASUREMENT_ID=$(jq -r '.measurementId // empty' /tmp/fc.json)"  >> $GITHUB_ENV

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJ }}

      - name: Build Web Release
        run: |
          flutter build web --release \
            --dart-define=FIREBASE_WEB_API_KEY=${{ env.FIREBASE_WEB_API_KEY }} \
            --dart-define=FIREBASE_WEB_APP_ID=${{ env.FIREBASE_WEB_APP_ID }} \
            --dart-define=FIREBASE_SENDER_ID=${{ env.FIREBASE_SENDER_ID }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ env.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ env.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MEASUREMENT_ID=${{ env.FIREBASE_MEASUREMENT_ID }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=LOGROCKET_APP_ID=${{ secrets.LOGROCKET_APP_ID }} \
            --dart-define=AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
            --dart-define=AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
            --dart-define=GOOGLE_VERIFICATION_TAG=${{ secrets.GOOGLE_VERIFICATION_TAG }} \
            --dart-define=APPLOVIN_SDK_KEY=${{ secrets.APPLOVIN_SDK_KEY }} \
            --dart-define=META_AUDIENCE_NETWORK_APP_ID=${{ secrets.META_AUDIENCE_NETWORK_APP_ID }}
        working-directory: ${{ env.PROJ }}

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: trinetra-web-build
          path: ${{ env.PROJ }}/build/web/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Build Android APK
  # ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Parse Firebase Config
        run: |
          echo '${{ secrets.FIREBASE_CONFIG }}' > /tmp/fc.json
          echo "FIREBASE_ANDROID_API_KEY=$(jq -r '.android.apiKey // .apiKey // empty' /tmp/fc.json)" >> $GITHUB_ENV
          echo "FIREBASE_ANDROID_APP_ID=$(jq -r '.android.appId // .appId // empty' /tmp/fc.json)"   >> $GITHUB_ENV
          echo "FIREBASE_SENDER_ID=$(jq -r '.messagingSenderId // empty' /tmp/fc.json)"              >> $GITHUB_ENV
          echo "FIREBASE_PROJECT_ID=$(jq -r '.projectId // "trinetra-8b846"' /tmp/fc.json)"          >> $GITHUB_ENV
          echo "FIREBASE_STORAGE_BUCKET=$(jq -r '.storageBucket // "trinetra-8b846.appspot.com"' /tmp/fc.json)" >> $GITHUB_ENV

      - name: Setup Android Signing
        run: |
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > ${{ env.PROJ }}/android/app/keystore.jks
          printf "storeFile=keystore.jks\nstorePassword=${{ secrets.ANDROID_STORE_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\n" > ${{ env.PROJ }}/android/key.properties
        continue-on-error: true

      # FIX: exit code 126 — gradlew not executable
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew
        working-directory: ${{ env.PROJ }}

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJ }}

      - name: Build Android APK
        run: |
          flutter build apk --release \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ env.FIREBASE_ANDROID_API_KEY }} \
            --dart-define=FIREBASE_ANDROID_APP_ID=${{ env.FIREBASE_ANDROID_APP_ID }} \
            --dart-define=FIREBASE_SENDER_ID=${{ env.FIREBASE_SENDER_ID }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ env.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --dart-define=PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
            --dart-define=AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
            --dart-define=AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
            --dart-define=AWS_REGION=${{ secrets.AWS_REGION }} \
            --dart-define=ADMOB_ANDROID_APP_ID=${{ secrets.ADMOB_ANDROID_APP_ID }} \
            --dart-define=ADMOB_BANNER_ANDROID=${{ secrets.ADMOB_BANNER_ANDROID }} \
            --dart-define=ADMOB_INTERSTITIAL_ANDROID=${{ secrets.ADMOB_INTERSTITIAL_ANDROID }} \
            --dart-define=ADMOB_REWARDED_ANDROID=${{ secrets.ADMOB_REWARDED_ANDROID }} \
            --dart-define=APPLOVIN_SDK_KEY=${{ secrets.APPLOVIN_SDK_KEY }} \
            --dart-define=META_AUDIENCE_NETWORK_APP_ID=${{ secrets.META_AUDIENCE_NETWORK_APP_ID }}
        working-directory: ${{ env.PROJ }}

      - name: Collect APK
        run: |
          mkdir -p release-artifacts
          cp ${{ env.PROJ }}/build/app/outputs/flutter-apk/app-release.apk release-artifacts/TriNetra.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trinetra-android-apk
          path: release-artifacts/TriNetra.apk

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Build iOS — Unsigned IPA (no developer account needed)
  # ─────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Parse Firebase Config
        run: |
          echo '${{ secrets.FIREBASE_CONFIG }}' > /tmp/fc.json
          echo "FIREBASE_IOS_API_KEY=$(jq -r '.ios.apiKey // .apiKey // empty' /tmp/fc.json)"   >> $GITHUB_ENV
          echo "FIREBASE_IOS_APP_ID=$(jq -r '.ios.appId // .appId // empty' /tmp/fc.json)"     >> $GITHUB_ENV
          echo "FIREBASE_SENDER_ID=$(jq -r '.messagingSenderId // empty' /tmp/fc.json)"        >> $GITHUB_ENV
          echo "FIREBASE_PROJECT_ID=$(jq -r '.projectId // "trinetra-8b846"' /tmp/fc.json)"    >> $GITHUB_ENV
          echo "FIREBASE_STORAGE_BUCKET=$(jq -r '.storageBucket // "trinetra-8b846.appspot.com"' /tmp/fc.json)" >> $GITHUB_ENV

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJ }}

      # FIX: ensure iOS scripts are executable before building
      - name: Make iOS scripts executable
        run: |
          find . -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
          chmod +x ios/Pods/Headers/Public/ 2>/dev/null || true
        working-directory: ${{ env.PROJ }}
        continue-on-error: true

      - name: Build iOS (No Code Sign — unsigned)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FIREBASE_IOS_API_KEY=${{ env.FIREBASE_IOS_API_KEY }} \
            --dart-define=FIREBASE_IOS_APP_ID=${{ env.FIREBASE_IOS_APP_ID }} \
            --dart-define=FIREBASE_SENDER_ID=${{ env.FIREBASE_SENDER_ID }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ env.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --dart-define=PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=ADMOB_IOS_APP_ID=${{ secrets.ADMOB_IOS_APP_ID }}
        working-directory: ${{ env.PROJ }}

      - name: Create Unsigned IPA
        run: |
          mkdir -p release-artifacts Payload
          cp -r ${{ env.PROJ }}/build/ios/iphoneos/Runner.app Payload/
          zip -r release-artifacts/TriNetra-iOS-Unsigned.ipa Payload/
        continue-on-error: true

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trinetra-ios-ipa
          path: release-artifacts/TriNetra-iOS-Unsigned.ipa
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Build macOS — Unsigned DMG (no developer account needed)
  # ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJ }}

      - name: Build macOS (unsigned, no notarization)
        run: |
          flutter build macos --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=FIREBASE_PROJECT_ID=trinetra-8b846
        working-directory: ${{ env.PROJ }}

      - name: Create DMG
        run: |
          mkdir -p release-artifacts
          hdiutil create -volname "TriNetra" \
            -srcfolder "${{ env.PROJ }}/build/macos/Build/Products/Release/trinetra.app" \
            -ov -format UDZO \
            release-artifacts/TriNetra.dmg
        continue-on-error: true

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trinetra-macos-dmg
          path: release-artifacts/TriNetra.dmg
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Build Windows EXE
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Find Flutter project root
        shell: bash
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJ }}

      - name: Build Windows Release
        shell: bash
        run: |
          flutter build windows --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=FIREBASE_PROJECT_ID=trinetra-8b846
        working-directory: ${{ env.PROJ }}

      - name: Package Windows Build
        shell: pwsh
        run: |
          $proj = "$env:PROJ"
          New-Item -ItemType Directory -Force -Path "release-artifacts"
          Compress-Archive -Path "$proj\build\windows\x64\runner\Release\*" -DestinationPath "release-artifacts\TriNetra-Windows.zip" -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trinetra-windows-zip
          path: release-artifacts/TriNetra-Windows.zip

  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Build Linux DEB
  # ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FIX: exit code 1 — install ALL required Linux build tools first
      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf2.0-dev libatk1.0-dev \
            libx11-dev libxext-dev libxrender-dev \
            dpkg fakeroot

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJ }}

      - name: Build Linux Release
        run: |
          flutter build linux --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=FIREBASE_PROJECT_ID=trinetra-8b846
        working-directory: ${{ env.PROJ }}

      - name: Package as DEB
        run: |
          mkdir -p trinetra-deb/DEBIAN
          mkdir -p trinetra-deb/usr/local/bin/trinetra
          mkdir -p trinetra-deb/usr/share/applications
          cp -r ${{ env.PROJ }}/build/linux/x64/release/bundle/* trinetra-deb/usr/local/bin/trinetra/
          cat > trinetra-deb/DEBIAN/control << 'EOF'
          Package: trinetra
          Version: 1.0.0
          Section: social
          Priority: optional
          Architecture: amd64
          Maintainer: TriNetra Technologies <contact@trinetra.app>
          Description: TriNetra - A Premium Social Super-App
           Connect with friends and the world around you on 6 platforms.
          EOF
          cat > trinetra-deb/usr/share/applications/trinetra.desktop << 'EOF'
          [Desktop Entry]
          Name=TriNetra
          Comment=A Premium Social Super-App
          Exec=/usr/local/bin/trinetra/trinetra
          Icon=trinetra
          Terminal=false
          Type=Application
          Categories=Network;Social;
          EOF
          mkdir -p release-artifacts
          dpkg-deb --build trinetra-deb release-artifacts/TriNetra.deb

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: trinetra-linux-deb
          path: release-artifacts/TriNetra.deb

  # ─────────────────────────────────────────────────────────────────
  # JOB 7: Assemble Downloads + Deploy to Firebase Hosting
  # Runs AFTER all platform builds — copies artifacts into
  # build/web/downloads/ so the PWA can serve native download links.
  # ─────────────────────────────────────────────────────────────────
  deploy-firebase:
    name: Deploy to Firebase (Web + Downloads)
    needs: [build-web, build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Run even if optional native builds (iOS/macOS) are skipped
    if: ${{ !cancelled() && needs.build-web.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Parse Firebase Project ID
        run: |
          echo '${{ secrets.FIREBASE_CONFIG }}' > /tmp/fc.json
          echo "FIREBASE_PROJECT_ID=$(jq -r '.projectId // "trinetra-8b846"' /tmp/fc.json)" >> $GITHUB_ENV

      # ── Restore the Flutter web build ────────────────────────────
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: trinetra-web-build
          path: ${{ env.PROJ }}/build/web/

      # ── Download all native platform builds ──────────────────────
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: trinetra-android-apk
          path: native-artifacts/android/
        continue-on-error: true

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: trinetra-windows-zip
          path: native-artifacts/windows/
        continue-on-error: true

      - name: Download Linux DEB
        uses: actions/download-artifact@v4
        with:
          name: trinetra-linux-deb
          path: native-artifacts/linux/
        continue-on-error: true

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: trinetra-macos-dmg
          path: native-artifacts/macos/
        continue-on-error: true

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: trinetra-ios-ipa
          path: native-artifacts/ios/
        continue-on-error: true

      # ── Assemble /downloads/ folder inside web build ─────────────
      - name: Assemble downloads/ folder in web build
        run: |
          mkdir -p ${{ env.PROJ }}/build/web/downloads
          # Android APK
          if [ -f "native-artifacts/android/TriNetra.apk" ]; then
            cp native-artifacts/android/TriNetra.apk ${{ env.PROJ }}/build/web/downloads/
            echo "✅ Android APK copied"
          fi
          # Windows ZIP
          if [ -f "native-artifacts/windows/TriNetra-Windows.zip" ]; then
            cp native-artifacts/windows/TriNetra-Windows.zip ${{ env.PROJ }}/build/web/downloads/
            echo "✅ Windows ZIP copied"
          fi
          # Linux DEB
          if [ -f "native-artifacts/linux/TriNetra.deb" ]; then
            cp native-artifacts/linux/TriNetra.deb ${{ env.PROJ }}/build/web/downloads/
            echo "✅ Linux DEB copied"
          fi
          # macOS DMG
          if [ -f "native-artifacts/macos/TriNetra.dmg" ]; then
            cp native-artifacts/macos/TriNetra.dmg ${{ env.PROJ }}/build/web/downloads/
            echo "✅ macOS DMG copied"
          fi
          # iOS IPA
          if [ -f "native-artifacts/ios/TriNetra-iOS-Unsigned.ipa" ]; then
            cp native-artifacts/ios/TriNetra-iOS-Unsigned.ipa ${{ env.PROJ }}/build/web/downloads/
            echo "✅ iOS IPA copied"
          fi
          echo "── Downloads folder contents ──"
          ls -lh ${{ env.PROJ }}/build/web/downloads/ || echo "(empty)"

      # ── Inject Google Search Console Verification Tag ────────────
      # Accepts code-only (ABC123) or full <meta> tag — auto-wraps if needed
      - name: Inject Google Search Console Tag
        env:
          GOOGLE_VERIFICATION_TAG: ${{ secrets.GOOGLE_VERIFICATION_TAG }}
          PROJ_DIR: ${{ env.PROJ }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          tag = os.environ.get('GOOGLE_VERIFICATION_TAG', '').strip()
          if not tag:
              print("⚠️  GOOGLE_VERIFICATION_TAG not set — skipping.")
              sys.exit(0)
          if not tag.startswith('<'):
              tag = f'<meta name="google-site-verification" content="{tag}">'
          proj = os.environ.get('PROJ_DIR', '.')
          path = f'{proj}/build/web/index.html'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          placeholder = '<meta name="google-site-verification" content="YOUR_GOOGLE_SEARCH_CONSOLE_CODE">'
          if placeholder in content:
              content = content.replace(placeholder, tag)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"✅ Injected: {tag}")
          elif 'google-site-verification' in content:
              print("✅ Tag already present.")
          else:
              print("❌ Placeholder not found. Check index.html source.")
              sys.exit(1)
          PYEOF

      # ── Deploy to Firebase Hosting ────────────────────────────────
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          entryPoint: ./${{ env.PROJ }}

      - name: Print Live URLs
        run: |
          echo "✅ LIVE → https://trinetra-8b846.web.app"
          echo "✅ LIVE → https://trinetra-8b846.firebaseapp.com"
          echo ""
          echo "Download Links:"
          echo "  APK  → https://trinetra-8b846.web.app/downloads/TriNetra.apk"
          echo "  EXE  → https://trinetra-8b846.web.app/downloads/TriNetra-Windows.zip"
          echo "  DEB  → https://trinetra-8b846.web.app/downloads/TriNetra.deb"
          echo "  DMG  → https://trinetra-8b846.web.app/downloads/TriNetra.dmg"

  # ─────────────────────────────────────────────────────────────────
  # JOB 8: Create GitHub Release with all platform artifacts
  # ─────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [deploy-firebase]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.create_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Find Flutter project root
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "PROJ=." >> $GITHUB_ENV
          elif [ -f "trinetra/pubspec.yaml" ]; then
            echo "PROJ=trinetra" >> $GITHUB_ENV
          else
            echo "❌ pubspec.yaml not found" && exit 1
          fi

      - name: Get App Version
        id: version
        run: |
          VERSION=$(grep '^version:' ${{ env.PROJ }}/pubspec.yaml | awk '{print $2}' | head -1)
          echo "version=${VERSION:-1.0.0}" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TriNetra v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## TriNetra v${{ steps.version.outputs.version }} — 6-Platform Super-App

            | Platform | File | Notes |
            |----------|------|-------|
            | Android  | `TriNetra.apk` | Direct sideload |
            | iOS      | `TriNetra-iOS-Unsigned.ipa` | Unsigned — use AltStore / Sideloadly |
            | macOS    | `TriNetra.dmg` | Unsigned — right-click → Open |
            | Windows  | `TriNetra-Windows.zip` | Extract and run |
            | Linux    | `TriNetra.deb` | `sudo dpkg -i TriNetra.deb` |
            | Web PWA  | Live at https://trinetra-8b846.web.app | |

            Built with Flutter ${{ env.FLUTTER_VERSION }}
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.ipa
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

