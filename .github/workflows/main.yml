name: TriNetra Final - All 6 Platforms & AWS Launch

on:
  push:
    branches: [ main ]    # 🔥 ऑटो-रन चालू है
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # 1. ANDROID BUILD 🟢
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK & AAB)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          echo "🔥 AUTO-PATCHING: Creating missing asset folders (Git ignores empty folders)..."
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          
          flutter clean
          flutter pub get
          
          echo "🔥 AUTO-PATCHING: Injecting Namespace for Facebook Audience Network..."
          FAN_DIR=$(find ~/.pub-cache/hosted -name "facebook_audience_network*" -type d | head -n 1)
          if [ -n "$FAN_DIR" ]; then
            sed -i.bak 's/android {/android {\n    namespace "com.facebook.audiencenetwork"/g' "$FAN_DIR/android/build.gradle" || true
          fi

          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          
          # 🔥 ALL 17 KEYS INJECTED (APK)
          flutter build apk --release -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
          # 🔥 ALL 17 KEYS INJECTED (APPBUNDLE)
          flutter build appbundle --release -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Save Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  # 2. WINDOWS BUILD 🔵
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows EXE
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          echo "🔥 AUTO-PATCHING: Creating missing asset folders..."
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          
          flutter config --enable-windows-desktop
          flutter clean
          
          echo "🔥 AUTO-PATCHING: Forcing Latest Sentry for CMake 3.31 support..."
          flutter pub add sentry_flutter:^8.11.0
          flutter pub get
          
          # 🔥 Verbose (-v) added
          flutter build windows --release -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: '**/build/windows/x64/runner/Release/'

  # 3. LINUX BUILD 🟣
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          echo "🔥 AUTO-PATCHING: Creating missing asset folders..."
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          
          flutter config --enable-linux-desktop
          flutter clean
          
          echo "🔥 AUTO-PATCHING: Forcing Latest Sentry for CMake 3.31 support..."
          flutter pub add sentry_flutter:^8.11.0
          flutter pub get
          
          # 🔥 Verbose (-v) added
          flutter build linux --release -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: '**/build/linux/x64/release/bundle/'

  # 4. iOS BUILD 🔴 
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          echo "🔥 AUTO-PATCHING: Creating missing asset folders..."
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          
          flutter clean
          flutter pub get
          
          echo "🔥 AUTO-PATCHING: Fixing flutter_vibrate iOS Simulator Bug..."
          find ~/.pub-cache/hosted -name "SwiftVibratePlugin.swift" -exec sed -i '' 's/TARGET_OS_SIMULATOR/targetEnvironment(simulator)/g' {} + || true
          
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          # 🔥 Verbose (-v) added
          flutter build ios --release --no-codesign -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      
      - name: Upload iOS Artifact (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Release-Unsigned
          path: '**/build/ios/iphoneos/Runner.app'

  # 5. macOS BUILD 🟠
  build-macos:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build macOS
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          echo "🔥 AUTO-PATCHING: Creating missing asset folders..."
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          
          flutter config --enable-macos-desktop
          flutter create --platforms=macos . || true
          flutter clean
          flutter pub get
          
          echo "🔥 AUTO-PATCHING: Safe macOS Deployment Target..."
          find macos -name "Podfile" -exec sed -i '' "s/platform :osx, '10.11'/platform :osx, '10.15'/g" {} + || true
          find macos -name "project.pbxproj" -exec sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9\.]*/MACOSX_DEPLOYMENT_TARGET = 10.15/g' {} + || true
          
          export MACOSX_DEPLOYMENT_TARGET=10.15
          # 🔥 Verbose (-v) added
          flutter build macos --release -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: '**/build/macos/Build/Products/Release/*.app'

  # 6. WEB PWA & AWS S3 DEPLOY 🟡
  deploy-web-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # 🔥 THE MASTER RADAR: DART SCANNER 🔥
      - name: 🕵️ DART ERROR SCANNER (Deep Search)
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          echo "🔥 AUTO-PATCHING: Creating missing asset folders..."
          mkdir -p assets/images assets/lottie assets/icons assets/locales
          flutter pub get
          echo "🔥 Scanning your code for any hidden spelling mistakes or missing files..."
          flutter analyze || true
          
      - name: Build Web PWA
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          
          # 🔥 Verbose Flag (-v) Added: Exact error line milegi!
          flutter build web --release -v \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Deploy Frontend to AWS S3 Bucket
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR/build/web"
          echo "🔥 Build Pass! AWS Sync is PAUSED to save billing."
          # aws s3 sync . s3://trinetra-web-app --delete || true
