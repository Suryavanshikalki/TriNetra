              "import 'package:cloud_firestore/cloud_firestore.dart';\nclass EscalationService {\n  static Future<void> report(String contentId, String category, String reporterId) async {\n    await FirebaseFirestore.instance.collection('reports').add({\n      'contentId': contentId, 'category': category, 'reporterId': reporterId,\n      'status': 'pending', 'level': 0, 'timestamp': FieldValue.serverTimestamp()\n    });\n  }\n}")

