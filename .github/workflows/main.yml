name: TriNetra Auto-Update, All Stores & Web Release
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android (APK for Web Download & AAB for Play Store)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release
      - name: Save Android Apps to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Android-Apps
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows (EXE for Web Download & Store Prep)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux (App for Web Download & Store Prep)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

  build-apple:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS & macOS (Apple Store Prep)
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build ios --release --no-codesign || true
          flutter build macos --release || true

  deploy-web-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Web PWA & Deploy to Firebase
        shell: bash
        run: |
          APP_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$APP_DIR"
          flutter pub get
          flutter build web --release
          
          cd $GITHUB_WORKSPACE
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
          
          FIREBASE_DIR=$(dirname $(find . -name "firebase.json" | head -n 1))
          cd "$FIREBASE_DIR"
          firebase deploy --only hosting
          rm $GITHUB_WORKSPACE/sa.json
