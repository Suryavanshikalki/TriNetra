name: TriNetra Final Master Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Android Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android APK and AAB
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          if [ -f "android/gradlew" ]; then chmod +x android/gradlew; fi
          
          flutter build apk --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
          flutter build appbundle --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
            
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter config --enable-windows-desktop
          flutter clean
          flutter pub get
          flutter build windows --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Release
          path: '**/build/windows/x64/runner/Release/'

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libcurl4-openssl-dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Linux App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter config --enable-linux-desktop
          flutter clean
          flutter pub get
          flutter build linux --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Release
          path: '**/build/linux/x64/release/bundle/'

  build-ios:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build iOS App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          
          find ~/.pub-cache/hosted -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/isiOSAppOnVision/isMacCatalystApp/g' {} + || true
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} + || true
          
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          flutter build ios --release --no-codesign \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Release-Unsigned
          path: '**/build/ios/iphoneos/Runner.app'

  build-macos:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || true
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build macOS App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          
          flutter config --enable-macos-desktop
          flutter create --platforms=macos . || true
          flutter clean
          flutter pub get
          
          find macos -name "project.pbxproj" -exec sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = [0-9\.]*/MACOSX_DEPLOYMENT_TARGET = 10.15/g' {} + || true
          
          export MACOSX_DEPLOYMENT_TARGET=10.15
          flutter build macos --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Release
          path: '**/build/macos/Build/Products/Release/*.app'

  deploy-web-aws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Web App
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR"
          flutter clean
          flutter pub get
          flutter build web --release \
            --dart-define=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --dart-define=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dart-define=AWS_APP_RUNNER_ARN="${{ secrets.AWS_APP_RUNNER_ARN }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=ZEGOCLOUD_APP_ID="${{ secrets.ZEGOCLOUD_APP_ID }}" \
            --dart-define=ZEGOCLOUD_APP_SIGN="${{ secrets.ZEGOCLOUD_APP_SIGN }}" \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dart-define=META_API_KEY="${{ secrets.META_API_KEY }}" \
            --dart-define=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dart-define=MANUS_API_KEY="${{ secrets.MANUS_API_KEY }}" \
            --dart-define=EMERGENT_API_KEY="${{ secrets.EMERGENT_API_KEY }}" \
            --dart-define=PAYU_MERCHANT_KEY="${{ secrets.PAYU_MERCHANT_KEY }}" \
            --dart-define=BRAINTREE_TOKEN="${{ secrets.BRAINTREE_TOKEN }}" \
            --dart-define=PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --dart-define=PADDLE_KEY="${{ secrets.PADDLE_KEY }}" \
            --dart-define=ADYEN_KEY="${{ secrets.ADYEN_KEY }}"
      - name: Deploy Frontend to AWS S3 Bucket
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          APP_DIR=$(dirname "$(find . -name "pubspec.yaml" | head -n 1)")
          cd "$APP_DIR/build/web"
          aws s3 sync . s3://trinetra-web-app --delete || true
