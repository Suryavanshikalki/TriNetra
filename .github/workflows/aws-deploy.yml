name: TriNetra Master AWS Deploy (Safe Mode)

on:
  # push:
  #   branches: [ main ] # 🔥 OFF: अब पुश करने पर खुद से बिल नहीं बढ़ेगा
  workflow_dispatch:      # ✅ ON: सिर्फ जब तुम बटन दबाओगे तभी चलेगा

jobs:
  # 🎨 Phase 1: Frontend Build (Deployment Paused)
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend
        rm -rf node_modules package-lock.json
        npm install
        npm install i18next react-i18next i18next-browser-languagedetector lucide-react
        CI=false npm run build

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1 

    - name: Deploy to S3 Bucket (PAUSED)
      run: |
        # 🔥 बिलिंग रोकने के लिए नीचे की लाइन कमेंट कर दी गई है
        echo "S3 Sync Paused: Account Verification Pending"
        # if [ -d "frontend/dist" ]; then
        #   aws s3 sync frontend/dist/ s3://trinetra-app-live --delete
        # else
        #   exit 1
        # fi

  # 🧠 Phase 2: Backend (Trigger Paused)
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-deploy-frontend
    steps:
    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    - name: Trigger App Runner (PAUSED)
      run: |
        # 🔥 ARN खाली होने पर एरर रोकने के लिए इसे रोका गया है
        echo "App Runner Trigger Paused"
        # aws apprunner start-deployment --service-arn ${{ secrets.AWS_APP_RUNNER_ARN }}
