name: TriNetra Master Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        # i18next पैकेज को जबरदस्ती यहाँ इंस्टॉल कर रहे हैं
        npm install i18next react-i18next
        CI=false npm run build

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # 🔥 आपकी फोटो के हिसाब से एकदम सही नाम!
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1 

    - name: Deploy to S3 Bucket
      run: |
        aws s3 sync frontend/dist/ s3://trinetra-app-live --delete 
