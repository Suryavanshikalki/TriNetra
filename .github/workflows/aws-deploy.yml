name: TriNetra Master AWS Deploy

on:
  push:
    branches: [ main ]

jobs:
  # 🎨 Phase 1: Frontend को S3 पर भेजना
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend
        # पुराने कचरे को हटाकर ताज़ा इनस्टॉल
        rm -rf node_modules package-lock.json
        npm install
        # गायब पैकेजेस का ब्रह्मास्त्र
        npm install i18next react-i18next i18next-browser-languagedetector lucide-react
        # बिल्ड को फ़ोर्स करना ताकि dist फोल्डर पक्का बने
        CI=false npm run build

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # 🔥 आपकी तिजोरी वाले असली नाम
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1 

    - name: Deploy to S3 Bucket
      run: |
        # 🔥 ACL एरर से बचने के लिए सीधा सिंक (Access Denied नहीं आएगा)
        if [ -d "frontend/dist" ]; then
          aws s3 sync frontend/dist/ s3://trinetra-app-live --delete
        else
          echo "TriNetra Error: dist folder missing! Build failed."
          exit 1
        fi

  # 🧠 Phase 2: Backend (App Runner) - Frontend और Backend दोनों 100% AWS से!
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-deploy-frontend
    steps:
    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    - name: Trigger App Runner
      run: |
        aws apprunner start-deployment --service-arn ${{ secrets.AWS_APP_RUNNER_ARN }}
