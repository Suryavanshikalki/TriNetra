name: TriNetra AWS Auto-Deploy

# यह तब चलेगा जब आप 'main' ब्रांच पर कुछ भी पुश करेंगे
on:
  push:
    branches: [ main ]

jobs:
  # 🎨 भाग 1: Frontend को Deploy करना (S3 Bucket में)
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Frontend (React/Vite)
      run: |
        cd frontend
        npm install
        npm run build

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1 

    - name: Deploy Frontend to S3 Bucket
      run: aws s3 sync frontend/dist/ s3://trinetra-app-live --delete 

  # 🧠 भाग 2: Backend को Deploy करना (AWS App Runner)
  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend  # पहले Frontend होगा, फिर Backend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Trigger App Runner Deployment
      run: |
        # यह कमांड AWS App Runner को बोलेगा कि नया कोड खींच लो
        aws apprunner start-deployment --service-arn ${{ secrets.AWS_APP_RUNNER_ARN }}
