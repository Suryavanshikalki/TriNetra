name: TriNetra AWS Full Auto-Deploy

on:
  push:
    branches: [ main ]

jobs:
  # 🎨 भाग 1: Frontend (React/Vite) को S3 पर भेजना
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm install i18next react-i18next
        CI=false npm run build

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # 🔥 यहाँ मैंने आपके वाले असली नाम डाल दिए हैं!
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1 

    - name: Deploy to S3 Bucket
      run: |
        aws s3 sync frontend/dist/ s3://trinetra-app-live --delete 

  # नोट: Backend वाले हिस्से को अभी रोक दिया है ताकि Frontend 100% पास हो जाए।
  # जब आप App Runner सेट कर लेंगे, तब हम इसे खोल देंगे।
