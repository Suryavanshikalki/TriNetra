name: TriNetra Master Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend
        rm -rf node_modules package-lock.json
        npm install
        npm install i18next react-i18next i18next-browser-languagedetector lucide-react
        # 🔥 बिल्ड को फ़ोर्स करना ताकि हर हाल में dist फोल्डर बने
        CI=false npm run build

    - name: Connect to AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1 

    - name: Deploy to S3 Bucket
      run: |
        # 🔥 फोल्डर चेक और सिंक
        if [ -d "frontend/dist" ]; then
          aws s3 sync frontend/dist/ s3://trinetra-app-live --delete --acl public-read
        else
          echo "TriNetra Error: dist folder missing!"
          exit 1
        fi
